name: Build SisoVPN APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch app name to SisoVPN
        run: |
          find . -name "strings.xml" -exec sed -i 's/v2rayNG/SisoVPN/g' {} \;
          find . -name "strings.xml" -exec sed -i 's/v2RayNG/SisoVPN/g' {} \;

      - name: Patch only primary colors (keep missing colors)
        run: |
          COLORS="V2rayNG/app/src/main/res/values/colors.xml"
          sed -i 's|<color name="colorPrimary">.*</color>|<color name="colorPrimary">#F0B90B</color>|g' "$COLORS"
          sed -i 's|<color name="colorPrimaryDark">.*</color>|<color name="colorPrimaryDark">#C49009</color>|g' "$COLORS"
          sed -i 's|<color name="colorAccent">.*</color>|<color name="colorAccent">#F0B90B</color>|g' "$COLORS"
          sed -i 's|<color name="md_theme_light_primary">.*</color>|<color name="md_theme_light_primary">#F0B90B</color>|g' "$COLORS"
          sed -i 's|<color name="md_theme_dark_primary">.*</color>|<color name="md_theme_dark_primary">#F0B90B</color>|g' "$COLORS"
          sed -i 's|<color name="md_theme_light_background">.*</color>|<color name="md_theme_light_background">#0B0B0F</color>|g' "$COLORS"
          sed -i 's|<color name="md_theme_dark_background">.*</color>|<color name="md_theme_dark_background">#0B0B0F</color>|g' "$COLORS"
          sed -i 's|<color name="md_theme_light_surface">.*</color>|<color name="md_theme_light_surface">#13131A</color>|g' "$COLORS"
          sed -i 's|<color name="md_theme_dark_surface">.*</color>|<color name="md_theme_dark_surface">#13131A</color>|g' "$COLORS"

      - name: Build APK
        run: |
          chmod +x V2rayNG/gradlew
          cd V2rayNG
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias sisovpn -dname "CN=SisoVPN,O=SisoVPN,C=IR" -storepass sisovpn123 -keypass sisovpn123
          APK=$(find V2rayNG -name "*release*.apk" | head -1)
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign --ks key.jks --ks-alias sisovpn --ks-pass pass:sisovpn123 --key-pass pass:sisovpn123 --out SisoVPN.apk "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SisoVPN-APK
          path: SisoVPN.apk
          retention-days: 30
