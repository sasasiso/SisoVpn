name: Build SisoVPN APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SisoVPN repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch app name to SisoVPN
        run: |
          find . -name "strings.xml" -exec sed -i 's/v2rayNG/SisoVPN/g' {} \;
          find . -name "strings.xml" -exec sed -i 's/v2RayNG/SisoVPN/g' {} \;

      - name: Patch colors to yellow-black theme
        run: |
          cat > V2rayNG/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#F0B90B</color>
              <color name="colorPrimaryDark">#C49009</color>
              <color name="colorAccent">#F0B90B</color>
              <color name="colorBackground">#0B0B0F</color>
              <color name="colorSurface">#13131A</color>
              <color name="colorOnPrimary">#0B0B0F</color>
              <color name="colorOnSurface">#EEEEF8</color>
              <color name="md_theme_light_primary">#F0B90B</color>
              <color name="md_theme_light_onPrimary">#0B0B0F</color>
              <color name="md_theme_light_background">#0B0B0F</color>
              <color name="md_theme_dark_primary">#F0B90B</color>
              <color name="md_theme_dark_onPrimary">#0B0B0F</color>
              <color name="md_theme_dark_background">#0B0B0F</color>
          </resources>
          EOF

      - name: Grant Gradle permission
        run: chmod +x V2rayNG/gradlew

      - name: Build Release APK
        run: |
          cd V2rayNG
          ./gradlew assembleRelease --no-daemon -Pkotlin.incremental=false

      - name: Sign APK
        run: |
          keytool -genkey -v \
            -keystore sisovpn-key.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias sisovpn \
            -dname "CN=SisoVPN,O=SisoVPN,C=IR" \
            -storepass sisovpn123 \
            -keypass sisovpn123

          APK=$(find V2rayNG -name "*release*.apk" | head -1)
          if [ -n "$APK" ]; then
            BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
            $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
              --ks sisovpn-key.jks \
              --ks-alias sisovpn \
              --ks-pass pass:sisovpn123 \
              --key-pass pass:sisovpn123 \
              --out SisoVPN-v1.0.0.apk \
              "$APK"
            echo "Signed APK ready!"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SisoVPN-APK
          path: SisoVPN-v1.0.0.apk
          retention-days: 30
